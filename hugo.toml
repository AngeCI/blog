baseURL = 'https://angeci.github.io/blog/'
title = 'AngeCI’s Blog'
theme = 'hugo-theme-stack'
enableMissingTranslationPlaceholders = true

[languages]
  [languages.en]
    contentDir = 'content/en'
    languageCode = 'en'
    languageName = 'English'
    weight = 1
  [languages.zh]
    contentDir = 'content/zh'
    languageCode = 'zh-hant-TW'
    languageName = '正體中文'
    weight = 2
  [languages.yue]
    contentDir = 'content/yue'
    languageCode = 'zh-hant-HK'
    languageName = '粵語'
    weight = 3

[caches]
  [caches.images]
    dir = ':cacheDir/images'
